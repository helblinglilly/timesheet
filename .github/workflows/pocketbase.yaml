name: Build Pocketbase image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pocketbase Version'
        required: true
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-pocketbase:
    name: Build and push Pocketbase image (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
          - platform: linux/amd64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./pocketbase.dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/pocketbase,push-by-digest=true,name-canonical=true
          build-args: |
            PB_VERSION=${{ github.event.inputs.tag }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests and push final image
    runs-on: ubuntu-24.04
    needs: build-pocketbase

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/pocketbase:${{ github.event.inputs.tag }} \
            $(printf 'ghcr.io/${{ github.repository_owner }}/pocketbase@sha256:%s ' *)