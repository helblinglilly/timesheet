<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Clock face -->
  <circle cx="16" cy="16" r="15" fill="#ebebeb" stroke="#000" stroke-width="2.2"/>
  <!-- Minute hand: pointing to ~56min (upper-left), long, thick -->
  <rect x="-2" y="-10" width="4" height="10" rx="1" fill="#111"
    transform="translate(16,16) rotate(-24)"/>
  <!-- Hour hand: pointing to ~4-5 o'clock (lower-right), short, thick -->
  <rect x="-2" y="-6" width="4" height="6" rx="1" fill="#111"
    transform="translate(16,16) rotate(144)"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="#b6253a"/>
</svg>
